<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Photobooth Guys</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coal:#0e0e18;--charcoal:#1a1a2e;--surface:#16162a;
  --teal:#5f94a4;--teal-light:#7ab8cc;--gold:#e8b83d;
  --white:#f4f4f5;--text-muted:rgba(244,244,245,.6);
  --border:rgba(95,148,164,.15);
  --font-body:'DM Sans',system-ui,sans-serif;
  --font-display:'Playfair Display',Georgia,serif;
}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--coal);font-family:var(--font-body);color:var(--white);
  background-image:radial-gradient(ellipse at 50% 0%,rgba(95,148,164,.08) 0%,transparent 60%);
}
.login-card{
  width:100%;max-width:400px;padding:48px 36px;
  background:rgba(22,22,42,.85);border:1px solid var(--border);
  border-radius:16px;backdrop-filter:blur(20px);
}
.logo{text-align:center;margin-bottom:32px}
.logo img{height:60px;width:auto}
.logo h1{font-family:var(--font-display);font-size:1.3rem;margin-top:12px;font-weight:700}
.logo p{color:var(--text-muted);font-size:.85rem;margin-top:4px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:.85rem;font-weight:500;margin-bottom:6px;color:var(--text-muted)}
.form-group input{
  width:100%;padding:12px 16px;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:8px;color:var(--white);
  font-size:.95rem;font-family:var(--font-body);transition:border-color .2s;
}
.form-group input:focus{outline:none;border-color:var(--teal)}
.btn{
  width:100%;padding:14px;border:none;border-radius:8px;cursor:pointer;
  font-size:.95rem;font-weight:600;font-family:var(--font-body);
  background:linear-gradient(135deg,var(--teal),var(--teal-light));
  color:var(--coal);transition:opacity .2s;
}
.btn:hover{opacity:.9}
.flash{
  padding:12px 16px;border-radius:8px;margin-bottom:20px;font-size:.85rem;
  background:rgba(220,53,69,.15);border:1px solid rgba(220,53,69,.3);color:#f87171;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="login-card">
  <div class="logo">
    <img src="/logo.webp" alt="Photobooth Guys">
    <h1>Admin Panel</h1>
    <p>Manage your website content</p>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
  <div class="flash">{{ message }}</div>
  {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" autofocus>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
